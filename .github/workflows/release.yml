name: Build and publish Windows release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover -s tests -v
          python app.py --self-test

      - name: Build Windows executable
        shell: powershell
        run: .\build.ps1

      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $attempts = 6
          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            Write-Host "Release attempt $attempt of $attempts"

            gh release view $env:GITHUB_REF_NAME *> $null
            if ($LASTEXITCODE -eq 0) {
              gh release upload $env:GITHUB_REF_NAME dist/SshTunnelManager.exe --clobber
            }
            else {
              gh release create $env:GITHUB_REF_NAME dist/SshTunnelManager.exe `
                --verify-tag `
                --generate-notes `
                --title "SSH Tunnel Manager $env:GITHUB_REF_NAME"
            }

            if ($LASTEXITCODE -eq 0) {
              Write-Host "Release published successfully."
              exit 0
            }
            if ($attempt -lt $attempts) {
              $delay = 15 * $attempt
              Write-Warning "GitHub Release service failed; retrying in $delay seconds."
              Start-Sleep -Seconds $delay
            }
          }
          throw "Unable to publish the release after $attempts attempts."
